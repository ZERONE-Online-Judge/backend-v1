name: Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "migrations/**"
      - "deploy/**"
      - "tests/**"
      - "Dockerfile"
      - "requirements.txt"
      - "alembic.ini"
      - ".github/workflows/backend-ci-cd.yml"
  pull_request:
    paths:
      - "app/**"
      - "migrations/**"
      - "deploy/**"
      - "tests/**"
      - "Dockerfile"
      - "requirements.txt"
      - "alembic.ini"
      - ".github/workflows/backend-ci-cd.yml"
  workflow_dispatch:

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Backend Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:////tmp/zerone_online_judge_ci.db
      ENABLE_DEMO_SEED: "true"
      ALLOW_EMPTY_OTP: "true"
      LOCAL_OBJECT_STORAGE_ROOT: /tmp/zerone_online_judge_objects
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/test_demo_api.py

  deploy:
    name: Deploy Backend
    needs: test
    runs-on: [self-hosted, zoj-prod, backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Deploy on server
        env:
          RELEASE_VERSION: ${{ github.sha }}
        run: |
          cd ~/zerone-online-judge/backend-v1
          git fetch origin main
          git checkout main
          git pull origin main
          RELEASE_VERSION="$RELEASE_VERSION" ./deploy/deploy-main-bluegreen.sh
          curl -f http://127.0.0.1:6001/api/health
