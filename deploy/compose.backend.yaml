x-api-service: &api-service
  build:
    context: ..
  env_file:
    - ./env/backend.env
  depends_on:
    migrate:
      condition: service_completed_successfully
    minio-init:
      condition: service_completed_successfully
  expose:
    - "8000"
  healthcheck:
    test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=2)"]
    interval: 10s
    timeout: 3s
    retries: 12
  restart: unless-stopped

services:
  nginx:
    image: nginx:stable
    depends_on:
      api-blue:
        condition: service_healthy
    ports:
      - "6001:80"
    volumes:
      - ../../demo_frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/api-upstream.conf:/etc/nginx/conf.d/api-upstream.conf:ro
    restart: unless-stopped

  api-blue:
    <<: *api-service
    environment:
      RELEASE_COLOR: blue
      RELEASE_VERSION: ${RELEASE_VERSION:-local}

  api-green:
    <<: *api-service
    environment:
      RELEASE_COLOR: green
      RELEASE_VERSION: ${RELEASE_VERSION:-local}

  migrate:
    build:
      context: ..
    command: ["alembic", "upgrade", "head"]
    env_file:
      - ./env/backend.env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  postgres:
    image: postgres:16
    env_file:
      - ./env/db.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    env_file:
      - ./env/minio.env
    volumes:
      - minio_data:/data
    expose:
      - "9000"
      - "9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - ./env/minio.env
      - ./env/backend.env
    entrypoint: ["/bin/sh", "-c"]
    command: ["until mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do sleep 2; done; mc mb -p local/$${OBJECT_STORAGE_BUCKET} || true"]
    restart: "no"

  mail-worker:
    build:
      context: ..
    command: ["python", "-m", "app.workers.mail_worker"]
    env_file:
      - ./env/backend.env
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  bundle-worker:
    build:
      context: ..
    command: ["python", "-m", "app.workers.bundle_worker"]
    env_file:
      - ./env/backend.env
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  postgres-backup:
    image: postgres:16
    profiles: ["backup"]
    env_file:
      - ./env/db.env
    environment:
      BACKUP_INTERVAL_SECONDS: "86400"
      BACKUP_DIR: "/backups/postgres"
    volumes:
      - postgres_backups:/backups/postgres
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: ["while true; do ts=$$(date -u +%Y%m%dT%H%M%SZ); PGPASSWORD=$${POSTGRES_PASSWORD} pg_dump -h postgres -U $${POSTGRES_USER} -d $${POSTGRES_DB} -Fc -f $${BACKUP_DIR}/zerone-$${ts}.dump; find $${BACKUP_DIR} -type f -mtime +14 -delete; sleep $${BACKUP_INTERVAL_SECONDS}; done"]
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  postgres_backups:
